<style>
  /* =============================================================
     AFRRCS Incident Report — Field App
     Design intent: calm, utilitarian, high-contrast. Built for use
     on a phone in cold conditions, possibly with gloves. Generous
     tap targets (min 44px), large readable text, no decorative
     fluff. Government-of-Alberta-friendly palette.
     ============================================================= */

  :root {
    --gov-blue: #0E5C8E;
    --gov-blue-dark: #0a4670;
    --gov-blue-light: #e8f1f8;
    --ink: #1a1f24;
    --ink-soft: #4a5563;
    --ink-faint: #8a93a0;
    --bg: #f4f6f8;
    --surface: #ffffff;
    --border: #d8dde3;
    --border-strong: #aab2bc;
    --danger: #b8202b;
    --danger-bg: #fdecee;
    --success: #1f7a3f;
    --success-bg: #e8f4ec;
    --warning-bg: #fff4e0;
    --classification: #0E5C8E;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow-sm: 0 1px 2px rgba(15,40,80,0.04), 0 1px 1px rgba(15,40,80,0.06);
    --shadow-md: 0 4px 12px rgba(15,40,80,0.08), 0 2px 4px rgba(15,40,80,0.06);
    --tap: 44px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 16px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
  }

  /* Classification banner — required on every screen for Protected A */
  .classification {
    background: var(--classification);
    color: #fff;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 6px 12px;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .classification.bottom { position: static; }

  /* App shell layout */
  .app {
    max-width: 720px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 56px;
  }
  .app-header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    flex: 1;
  }
  .header-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink);
    height: 36px;
    padding: 0 12px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .header-btn:active { background: var(--bg); }
  .header-btn svg { vertical-align: middle; }

  .main {
    flex: 1;
    padding: 16px;
    padding-bottom: 100px; /* room for sticky footer nav */
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: var(--tap);
    padding: 0 18px;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: background-color 0.1s, transform 0.05s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--gov-blue);
    color: #fff;
    border-color: var(--gov-blue);
  }
  .btn-primary:active { background: var(--gov-blue-dark); }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink);
    border-color: var(--border-strong);
  }
  .btn-secondary:active { background: var(--bg); }
  .btn-danger {
    background: var(--surface);
    color: var(--danger);
    border-color: var(--border);
  }
  .btn-danger:active { background: var(--danger-bg); }
  .btn-block { width: 100%; }
  .btn-lg { min-height: 52px; font-size: 17px; }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .card-clickable {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card-clickable:active { background: var(--bg); }

  /* Forms */
  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .field .help {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 4px;
    line-height: 1.4;
  }
  .field .optional {
    font-weight: 400;
    color: var(--ink-faint);
    font-size: 13px;
    margin-left: 4px;
  }
  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  input[type="number"],
  input[type="search"],
  select,
  textarea {
    display: block;
    width: 100%;
    min-height: var(--tap);
    padding: 10px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 16px; /* 16px prevents iOS zoom on focus */
    font-family: inherit;
    color: var(--ink);
    background: var(--surface);
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--gov-blue);
    outline-offset: -1px;
    border-color: var(--gov-blue);
  }
  textarea {
    min-height: 120px;
    resize: vertical;
    line-height: 1.5;
  }
  select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='%234a5563' d='M6 8L0 0h12z'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
  }
  .field-row {
    display: flex;
    gap: 10px;
  }
  .field-row .field { flex: 1; }
  .radio-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .radio-group label {
    flex: 1;
    min-width: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: var(--tap);
    padding: 8px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .radio-group input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .radio-group input[type="radio"]:checked + span,
  .radio-group label:has(input:checked) {
    background: var(--gov-blue-light);
    border-color: var(--gov-blue);
    color: var(--gov-blue-dark);
  }

  /* Step indicator */
  .step-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .step-dot {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    transition: background-color 0.2s;
  }
  .step-dot.active { background: var(--gov-blue); }
  .step-dot.done { background: var(--success); }
  .step-title {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    margin: 8px 16px 0;
    font-weight: 500;
  }
  .step-title strong { color: var(--ink); }

  /* Wizard footer (sticky) */
  .wizard-footer {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    display: flex;
    gap: 10px;
    z-index: 50;
  }
  .wizard-footer-inner {
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    gap: 10px;
  }
  .wizard-footer .btn { flex: 1; }

  /* Home screen */
  .hero {
    text-align: center;
    padding: 24px 16px 16px;
  }
  .hero h2 {
    margin: 0 0 6px;
    font-size: 22px;
    font-weight: 600;
  }
  .hero p {
    margin: 0;
    color: var(--ink-soft);
    font-size: 15px;
  }
  .draft-list {
    margin-top: 12px;
  }
  .draft-list h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 18px 4px 8px;
  }
  .draft-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .draft-info {
    flex: 1;
    min-width: 0;
  }
  .draft-title {
    font-weight: 600;
    font-size: 16px;
    margin: 0 0 2px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .draft-meta {
    font-size: 13px;
    color: var(--ink-soft);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .draft-actions {
    display: flex;
    gap: 6px;
  }
  .draft-list-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin: 18px 4px 8px;
  }
  .draft-list-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .link-btn {
    background: transparent;
    border: none;
    color: var(--gov-blue);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 6px;
    text-transform: none;
    -webkit-tap-highlight-color: transparent;
  }
  .link-btn:active { color: var(--gov-blue-dark); }
  .draft-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .draft-badge.incomplete {
    background: var(--warning-bg);
    color: #7a5300;
  }
  .draft-badge.ready {
    background: var(--success-bg);
    color: var(--success);
  }
  .draft-badge.neutral {
    background: var(--gov-blue-light);
    color: var(--gov-blue-dark);
  }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-soft);
    width: 36px;
    height: 36px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .icon-btn:active { background: var(--bg); }
  .icon-btn.danger { color: var(--danger); }
  .icon-btn.danger:active { background: var(--danger-bg); }
  .empty-state {
    text-align: center;
    padding: 24px 16px;
    color: var(--ink-faint);
    font-size: 14px;
    font-style: italic;
  }

  /* Site picker (combobox) */
  .site-search {
    position: relative;
  }
  .site-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    max-height: 280px;
    overflow-y: auto;
    z-index: 20;
  }
  .site-result {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 15px;
    -webkit-tap-highlight-color: transparent;
  }
  .site-result:last-child { border-bottom: none; }
  .site-result:active { background: var(--gov-blue-light); }
  .site-result .name { font-weight: 600; color: var(--ink); }
  .site-result .meta { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .site-selected-card {
    background: var(--gov-blue-light);
    border-color: var(--gov-blue);
    padding: 12px 14px;
  }
  .site-selected-card .top {
    display: flex; justify-content: space-between; align-items: start; gap: 8px;
  }
  .site-selected-card .name {
    font-weight: 600; color: var(--gov-blue-dark); font-size: 16px;
  }
  .site-selected-card .meta { font-size: 14px; color: var(--ink); margin-top: 4px; }
  .site-selected-card .change {
    background: transparent; border: none; color: var(--gov-blue);
    font-size: 14px; font-weight: 600; cursor: pointer; padding: 4px 0;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 30, 45, 0.6);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    animation: fadeIn 0.15s ease-out;
  }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    max-width: 500px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;

/* ===========================================================================
   STORAGE — IndexedDB wrapper
   - Reporter profile stored as a single record (id='profile') in 'kv' store
   - Drafts stored in 'drafts' store, keyed by report id
   =========================================================================== */
const DB_NAME = 'afrrcs_incident_reports';
const DB_VERSION = 1;
let dbPromise = null;

function openDB() {
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('drafts')) {
        db.createObjectStore('drafts', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('kv')) {
        db.createObjectStore('kv', { keyPath: 'key' });
      }
    };
  });
  return dbPromise;
}

async function dbGet(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(store, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

/* ===========================================================================
   PROFILE — reporter info, set up once and reused on every report
   =========================================================================== */
async function getProfile() {
  const rec = await dbGet('kv', 'profile');
  return rec ? rec.value : null;
}
async function saveProfile(profile) {
  await dbPut('kv', { key: 'profile', value: profile });
}

function renderDraftItem(d) {

    : '<em>Unnamed site</em>';

  // Compute completeness signals so the user can spot drafts that need
  // attention vs ones that are basically ready to generate.
  const photoCount = (d.photos || []).length;
  const hasNarrative = d.narrative && Object.values(d.narrative).some(v => v && v.trim());
  const missing = [];
  if (!d.site || !d.site.name) missing.push('site');
  if (!d.basics || !d.basics.afrrcsFile) missing.push('AFRRCS #');
  const incompleteBadge = missing.length > 0
    ? `<span class="draft-badge incomplete" title="Missing: ${esc(missing.join(', '))}">Incomplete</span>`
    : (hasNarrative
        ? `<span class="draft-badge ready" title="All required fields filled in">Ready</span>`
        : '');
  const photoBadge = photoCount > 0
    ? `<span class="draft-badge neutral">${photoCount} photo${photoCount > 1 ? 's' : ''}</span>`
    : '';

  return `
    <div class="card draft-item">
      <div class="draft-info" onclick="resumeDraft('${d.id}')" style="cursor:pointer">

/* ===========================================================================
   DRAFT EXPORT / IMPORT
   - A draft exports as a JSON file. Filename includes the site name and
     date so it's easy to identify outside the app. The exported file
     contains the entire report (text + photo data URLs + arrows + everything).
   - On import, we validate the basic shape, generate a new draft ID to
     avoid clobbering an existing draft with the same ID, and add it to
     the local list.
   =========================================================================== */
function exportDraft(id) {
  const d = state.drafts.find(x => x.id === id);
  if (!d) {
    toast('Draft not found');
    return;
  }
  const payload = {
    format: 'afrrcs-incident-report-draft',
    formatVersion: DRAFT_FILE_FORMAT_VERSION,
    exportedAt: new Date().toISOString(),
    appVersion: APP_VERSION,
    draft: d
  };
  const json = JSON.stringify(payload);
  const blob = new Blob([json], { type: 'application/json' });
  const filename = buildDraftFilename(d);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 1000);
  toast('Draft exported. Check your downloads.', 3000);
}

function buildDraftFilename(d) {
  // Pattern: draft_<SiteName>_<AFRRCSid>_<yyyy-mm-dd>.afrrcs-draft.json
  const siteName = (d.site && d.site.name ? d.site.name : 'Untitled')
    .replace(/[^A-Za-z0-9]/g, '_');
  const afrrcsId = (d.basics && d.basics.afrrcsFile ? d.basics.afrrcsFile : 'noid')
    .replace(/[^A-Za-z0-9-]/g, '');
  const dateStr = (d.basics && d.basics.reportDate ? d.basics.reportDate : todayISO());
  return `draft_${siteName}_${afrrcsId}_${dateStr}.afrrcs-draft.json`;
}

async function onDraftFileSelected(ev) {
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = ''; // allow re-selecting the same file later
  if (!file) return;

  let text;
  try {
    text = await file.text();
  } catch (e) {
    toast('Could not read the file', 3000);
    return;
  }

  let payload;
  try {
    payload = JSON.parse(text);
  } catch (e) {
    showModal({
      title: "That doesn't look like a draft file",
      body: '<p>The file could not be parsed as JSON. Make sure you picked an exported draft (a file ending in <code>.afrrcs-draft.json</code>).</p>',
      actions: [{ label: 'OK', kind: 'primary' }]
    });
    return;
  }

  // Basic shape check
  if (!payload || payload.format !== 'afrrcs-incident-report-draft' || !payload.draft) {
    showModal({
      title: "That isn't an AFRRCS draft file",
      body: '<p>The file was readable but does not appear to be an AFRRCS incident report draft. Pick a file exported from this app.</p>',
      actions: [{ label: 'OK', kind: 'primary' }]
    });
    return;
  }

  // Format version check (forward compatibility)
  if (payload.formatVersion > DRAFT_FILE_FORMAT_VERSION) {
    showModal({
      title: 'Draft was made by a newer version',
      body: `<p>This draft was exported from a newer version of the app (format v${esc(String(payload.formatVersion))}, this app supports v${DRAFT_FILE_FORMAT_VERSION}).</p>` +
        '<p>Importing it might lose some data. Continue anyway?</p>',
      actions: [
        { label: 'Cancel', kind: 'secondary' },
        { label: 'Import anyway', kind: 'primary', onClick: () => doImportDraft(payload.draft) }
      ]
    });
    return;
  }

  await doImportDraft(payload.draft);
}

async function doImportDraft(incoming) {
  // Sanity-fix shape — fall back to defaults if any field is missing,
  // since older exports might lack newer fields.
  const fresh = newReport();
  const draft = {
    ...fresh,
    ...incoming,
    // Fields that should be regenerated rather than carried over:
    id: 'rpt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    createdAt: incoming.createdAt || Date.now(),
    updatedAt: Date.now()
  };
  // Ensure nested shapes are sound
  draft.site = { ...fresh.site, ...(incoming.site || {}) };
  draft.basics = { ...fresh.basics, ...(incoming.basics || {}) };
  draft.narrative = { ...fresh.narrative, ...(incoming.narrative || {}) };
  draft.photos = Array.isArray(incoming.photos) ? incoming.photos : [];
  draft.previousIncidents = Array.isArray(incoming.previousIncidents) ? incoming.previousIncidents : [];

  try {
    await dbPut('drafts', draft);
    state.drafts = await dbGetAll('drafts');
    render();
    toast('Draft imported', 2500);
  } catch (e) {
    showModal({
      title: 'Could not save the imported draft',
      body: '<p>Saving the draft to local storage failed. This often means storage is full. ' +
        'Try deleting drafts you don\'t need.</p>' +
        `<pre style="background:var(--bg);padding:8px;border-radius:6px;font-size:12px">${esc(e.message || String(e))}</pre>`,
      actions: [{ label: 'Close', kind: 'secondary' }]
    });
  }
}

async function fillStorageUsage() {
  const el = document.getElementById('storage-meta');
  if (!el) return;
  try {
    if (navigator.storage && navigator.storage.estimate) {
      const est = await navigator.storage.estimate();
      const usedMb = (est.usage || 0) / 1048576;
      const quotaMb = (est.quota || 0) / 1048576;
      el.textContent = usedMb < 1
        ? `${(usedMb * 1024).toFixed(0)} KB used`
        : `${usedMb.toFixed(1)} MB used`;
    } else {
      el.textContent = 'unknown';
    }
  } catch (e) {
    el.textContent = '—';
  }
}

function settingsAction(which) {
  // Close the settings modal first
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) overlay.remove();
  if (which === 'profile') {
    editProfile();
  } else if (which === 'about') {
    showAboutModal();
  } else if (which === 'storage') {
    showStorageModal();
  }
}

async function showStorageModal() {
  let usageStr = 'unknown', quotaStr = 'unknown', percentStr = '';
  if (navigator.storage && navigator.storage.estimate) {
    try {
      const est = await navigator.storage.estimate();
      const usedMb = (est.usage || 0) / 1048576;
      const quotaMb = (est.quota || 0) / 1048576;
      usageStr = usedMb < 1 ? `${(usedMb * 1024).toFixed(0)} KB` : `${usedMb.toFixed(1)} MB`;
      quotaStr = quotaMb >= 1024 ? `${(quotaMb / 1024).toFixed(1)} GB` : `${quotaMb.toFixed(0)} MB`;
      if (est.quota) percentStr = ` (${(100 * (est.usage || 0) / est.quota).toFixed(2)}% of available)`;
    } catch (e) { /* fall through */ }
  }
  const draftCount = (state.drafts || []).length;
  const photoCount = (state.drafts || []).reduce((s, d) => s + (d.photos ? d.photos.length : 0), 0);
  showModal({
    title: 'Storage',
    body: `
      <p style="margin:0 0 12px">Drafts and photos live in this browser's local storage on this device.</p>
      <table class="info-table">
        <tr><td>Drafts saved:</td><td>${draftCount}</td></tr>
        <tr><td>Photos in drafts:</td><td>${photoCount}</td></tr>
        <tr><td>Storage used:</td><td>${esc(usageStr)}${esc(percentStr)}</td></tr>
        <tr><td>Storage available:</td><td>${esc(quotaStr)}</td></tr>
      </table>
      <p style="margin-top:12px;font-size:13px;color:var(--ink-soft)">If storage runs low, delete drafts you don't need. Exported drafts can be re-imported later.</p>
    `,
    actions: [{ label: 'Close', kind: 'primary' }]
  });
}

function renderStepBody(stepId) {
  const r = state.report;
  switch (stepId) {
    case 'site':
      return renderStepSite(r);
    case 'basics':
      return renderStepBasics(r);
    case 'narrative':
      return renderStepNarrative(r);
    case 'photos':
      return renderStepPhotos(r);
    case 'previous':
      return renderStepPrevious(r);
    case 'review':
      return renderStepReview(r);
  }

/* -------- Step 1 — Site --------------------------------------------------- */
function renderStepSite(r) {
  const hasSite = !!(r.site.name);
  return `
    ${hasSite ? `
      <div class="card site-selected-card">
        <div class="top">
          <div>
            <div class="name">${esc(r.site.name)}${r.site.number ? ' #' + esc(r.site.number) : ''}</div>
            <div class="meta">${esc(r.site.address || '')}</div>
            <div class="meta">${r.site.latitude ? 'Lat ' + esc(r.site.latitude) + '  Lon ' + esc(r.site.longitude) : 'No coordinates'}</div>
          </div>
          <button class="change" onclick="clearSite()">Change</button>
        </div>
      </div>
    ` : `
      <div class="card">
        <div class="field site-search">
          <label>Site</label>
          <input type="search" id="site-search" placeholder="Type a site name or number…" autocomplete="off">
          <div id="site-results" class="site-results hide"></div>
          <div class="help">Pick from the list, or <a href="#" onclick="event.preventDefault();showManualSite()">add a new site manually</a>.</div>
        </div>

/* -------- Photo capture ---------------------------------------------------
   Photos are compressed before storage:
   - Resize so the longest edge is <= 1600 px (preserves aspect ratio)
   - Re-encode as JPEG quality 0.85
   - Strip EXIF (loaded into canvas, so EXIF goes away naturally)
   This typically takes a 4 MB phone photo down to 200-500 KB. */
const PHOTO_MAX_DIM = 1600;
const PHOTO_JPEG_QUALITY = 0.85;

async function onPhotoSelected(ev, multiple) {
  const files = Array.from(ev.target.files || []);
  ev.target.value = ''; // allow re-selecting the same file
  if (files.length === 0) return;

  // Show a toast since compression of multiple large photos can take a few seconds
  if (files.length > 1) toast(`Processing ${files.length} photos…`, 5000);

  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    try {
      const compressed = await compressImage(f);
      const photo = {
        id: 'ph_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        imageData: compressed.dataUrl,
        width: compressed.width,
        height: compressed.height,
        caption: '',
        section: 'general',
        arrows: []
      };
      state.report.photos.push(photo);
    } catch (err) {
      console.error('Photo processing failed:', err);
      toast('Could not process one of the photos: ' + err.message, 4000);
    }
  }
  await saveDraftNow();
  renderWizard();
  if (files.length > 1) toast(`${files.length} photos added`, 1500);
}

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load image'));
      img.onload = () => {
        // Compute target size
        let w = img.naturalWidth, h = img.naturalHeight;
        const longest = Math.max(w, h);
        if (longest > PHOTO_MAX_DIM) {
          const scale = PHOTO_MAX_DIM / longest;
          w = Math.round(w * scale);
          h = Math.round(h * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', PHOTO_JPEG_QUALITY);
        resolve({ dataUrl, width: w, height: h });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function movePhoto(id, dir) {
  const photos = state.report.photos;
  const i = photos.findIndex(p => p.id === id);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= photos.length) return;
  [photos[i], photos[j]] = [photos[j], photos[i]];
  saveDraftNow();
  renderWizard();
}

let editorState = null; // { canvas, ctx, photo, image, drawing: { x1, y1 } | null }

function initPhotoEditorCanvas(photo) {
  const canvas = document.getElementById('photo-edit-canvas');
  if (!canvas) return;
  const img = new Image();
  img.onload = () => {
    // Set canvas internal dimensions to image natural size for crisp rendering.
    // CSS scales it down to fit screen width.
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    editorState = {
      canvas,
      ctx: canvas.getContext('2d'),
      photo,
      image: img,
      drawing: null
    };
    redrawEditor();
    attachEditorPointerEvents();
  };
  img.src = photo.imageData;
}

function redrawEditor() {
  if (!editorState) return;
  const { ctx, image, photo, drawing, canvas } = editorState;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(image, 0, 0);
  // Draw existing arrows
  (photo.arrows || []).forEach(a => drawArrow(ctx, a, canvas.width, canvas.height));
  // Draw in-progress arrow
  if (drawing) {
    drawArrow(ctx, drawing, canvas.width, canvas.height, true);
  }
}

// Arrow coords are stored as 0..1 fractions of image dimensions, so they
// remain correct at any rendered size and survive image resizes.
function drawArrow(ctx, a, W, H, isPreview) {
  const x1 = a.x1 * W, y1 = a.y1 * H, x2 = a.x2 * W, y2 = a.y2 * H;
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  if (len < 4) return;

  // Arrow stroke width scales with image size so it's visible regardless
  const strokeW = Math.max(6, Math.min(W, H) * 0.012);
  const headLen = Math.max(20, Math.min(W, H) * 0.04);
  const headAng = Math.PI / 6;

  ctx.save();
  ctx.strokeStyle = isPreview ? 'rgba(228,30,40,0.8)' : '#E41E28';
  ctx.fillStyle = isPreview ? 'rgba(228,30,40,0.8)' : '#E41E28';
  ctx.lineWidth = strokeW;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Subtle white outline for visibility on dark backgrounds
  ctx.shadowColor = 'rgba(255,255,255,0.6)';
  ctx.shadowBlur = strokeW * 0.5;

  // Shaft (stop short so the head doesn't overlap awkwardly)
  const shortenBy = headLen * 0.6;
  const shaftEndX = x2 - (dx / len) * shortenBy;
  const shaftEndY = y2 - (dy / len) * shortenBy;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(shaftEndX, shaftEndY);
  ctx.stroke();

  // Arrowhead (filled triangle)
  const ang = Math.atan2(dy, dx);
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(ang - headAng), y2 - headLen * Math.sin(ang - headAng));
  ctx.lineTo(x2 - headLen * Math.cos(ang + headAng), y2 - headLen * Math.sin(ang + headAng));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Translate a pointer event into image-space (0..1) coordinates
function pointerToImageCoords(ev) {
  const canvas = editorState.canvas;
  const rect = canvas.getBoundingClientRect();
  const cx = (ev.clientX - rect.left) / rect.width;
  const cy = (ev.clientY - rect.top) / rect.height;
  return { x: Math.max(0, Math.min(1, cx)), y: Math.max(0, Math.min(1, cy)) };
}

function attachEditorPointerEvents() {
  const canvas = editorState.canvas;

  // Use pointer events for unified mouse + touch support
  canvas.onpointerdown = (ev) => {
    ev.preventDefault();
    canvas.setPointerCapture(ev.pointerId);
    const p = pointerToImageCoords(ev);
    editorState.drawing = { x1: p.x, y1: p.y, x2: p.x, y2: p.y };
    redrawEditor();
  };

  canvas.onpointermove = (ev) => {
    if (!editorState.drawing) return;
    const p = pointerToImageCoords(ev);
    editorState.drawing.x2 = p.x;
    editorState.drawing.y2 = p.y;
    redrawEditor();
  };

  canvas.onpointerup = canvas.onpointercancel = (ev) => {
    if (!editorState.drawing) return;
    const d = editorState.drawing;
    editorState.drawing = null;
    // If the user just tapped without dragging, treat it as "remove arrow at this point"
    const dx = (d.x2 - d.x1) * editorState.canvas.width;
    const dy = (d.y2 - d.y1) * editorState.canvas.height;
    const dist = Math.hypot(dx, dy);
    if (dist < 8) {
      // Tap — try to delete an arrow near the tap
      removeArrowNear(d.x2, d.y2);
    } else {
      // Genuine drag — add arrow
      editorState.photo.arrows = editorState.photo.arrows || [];
      editorState.photo.arrows.push({
        id: 'ar_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5),
        x1: d.x1, y1: d.y1, x2: d.x2, y2: d.y2
      });
      scheduleSave();
      // Update the toolbar button states (undo/clear become enabled)
      const undoBtn = document.getElementById('tool-undo');
      if (undoBtn) undoBtn.disabled = false;
    }
    redrawEditor();
  };
}

// Distance from point (px, py) to line segment (x1,y1)-(x2,y2), all in 0..1 image space.
// Returns distance scaled by canvas width (so the threshold can be in px-equivalent terms).
function distancePointToArrow(px, py, a, W, H) {
  const x1 = a.x1 * W, y1 = a.y1 * H, x2 = a.x2 * W, y2 = a.y2 * H;
  const PX = px * W, PY = py * H;
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  let t = lenSq === 0 ? 0 : ((PX - x1) * dx + (PY - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const closestX = x1 + t * dx;
  const closestY = y1 + t * dy;
  return Math.hypot(PX - closestX, PY - closestY);
}

function removeArrowNear(x, y) {
  const photo = editorState.photo;
  if (!photo.arrows || photo.arrows.length === 0) return;
  const W = editorState.canvas.width, H = editorState.canvas.height;
  // Threshold in px (equivalent at image resolution): generous because
  // tap-to-delete needs a forgiving target on mobile
  const TH = Math.max(40, Math.min(W, H) * 0.04);
  let bestIdx = -1, bestDist = Infinity;
  for (let i = 0; i < photo.arrows.length; i++) {
    const d = distancePointToArrow(x, y, photo.arrows[i], W, H);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  if (bestIdx >= 0 && bestDist <= TH) {
    photo.arrows.splice(bestIdx, 1);
    scheduleSave();
    if (photo.arrows.length === 0) {
      const undoBtn = document.getElementById('tool-undo');
      if (undoBtn) undoBtn.disabled = true;
    }
  }
}

function setEditorTool(tool) {
  // Currently only one tool ('arrow') — kept as a hook for future tools
}

function undoLastArrow() {
  if (!editorState || !editorState.photo.arrows || editorState.photo.arrows.length === 0) return;
  editorState.photo.arrows.pop();
  scheduleSave();
  redrawEditor();
  // Update button enabled state
  const undoBtn = document.getElementById('tool-undo');
  if (undoBtn) undoBtn.disabled = editorState.photo.arrows.length === 0;
}

function clearAllArrows() {
  if (!editorState || !editorState.photo.arrows || editorState.photo.arrows.length === 0) return;
  showModal({
    title: 'Remove all arrows?',
    body: '<p>This will remove all red arrows on this photo. The photo itself is not affected.</p>',
    actions: [
      { label: 'Cancel', kind: 'secondary' },
      { label: 'Remove All', kind: 'danger', onClick: () => {
        editorState.photo.arrows = [];
        scheduleSave();
        redrawEditor();
        const undoBtn = document.getElementById('tool-undo');
        if (undoBtn) undoBtn.disabled = true;
      }}
    ]
  });
}

function confirmDeletePhoto(photoId) {
  showModal({
    title: 'Delete this photo?',
    body: '<p>The photo and any arrows on it will be removed from this report. This cannot be undone.</p>',
    actions: [
      { label: 'Cancel', kind: 'secondary' },
      { label: 'Delete', kind: 'danger', onClick: () => {
        state.report.photos = state.report.photos.filter(p => p.id !== photoId);
        saveDraftNow();
        closePhotoEditor();
      }}
    ]
  });
}

/* -------- Step 5 — Previous incidents ------------------------------------- */
function renderStepPrevious(r) {
  return `
    <p style="margin:0 0 16px;color:var(--ink-soft);font-size:14px">
      Add any previous incidents at this site within the past year. Skip this step if none apply — the section will be left out of the final report.
    </p>
    <div id="prev-list">
      ${r.previousIncidents.map((pi, i) => renderPrevItem(pi, i)).join('')}
    </div>
    <button class="btn btn-secondary btn-block" onclick="addPreviousIncident()">+ Add Previous Incident</button>
  `;
}

function renderPrevItem(pi, idx) {
  return `
    <div class="prev-item" data-prev-id="${pi.id}">
      <div class="prev-item-header">
        <h4>Incident ${idx + 1}</h4>
        <button class="icon-btn danger" onclick="removePreviousIncident('${pi.id}')" title="Remove">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="field">
        <label>AFRRCS file #</label>
        <input type="text" data-prev="afrrcsFile" data-id="${pi.id}" value="${esc(pi.afrrcsFile)}" placeholder="2025-057">
      </div>
      <div class="field">
        <label>Offence type</label>
        <input type="text" data-prev="offence" data-id="${pi.id}" value="${esc(pi.offence)}" placeholder="B&E, Theft">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="text" data-prev="date" data-id="${pi.id}" value="${esc(pi.date)}" placeholder="Nov 17, 2025">
      </div>
      <div class="field">
        <label>RCMP file # <span class="optional">(if known)</span></label>
        <input type="text" data-prev="rcmpFile" data-id="${pi.id}" value="${esc(pi.rcmpFile)}" placeholder="RCMP #2025-687597">
      </div>
      <div class="field">
        <label>Brief description</label>

}

function addPreviousIncident() {
  state.report.previousIncidents.push(newPreviousIncident());
  saveDraftNow();
  // Re-render the step to show the new item
  renderWizard();
}

function removePreviousIncident(id) {
  state.report.previousIncidents = state.report.previousIncidents.filter(p => p.id !== id);
  saveDraftNow();
  renderWizard();
}

/* ===========================================================================
   AUTO-SAVE & FORM BINDING
   - Any input with data-bind="path.to.field" two-way binds into state.report
   - Any input with data-prev="field" data-id="..." binds into a previousIncidents item
   - Saves debounce 500ms after last keystroke
   =========================================================================== */
function bindAutoSave() {
  // data-bind handlers
  document.querySelectorAll('[data-bind]').forEach(el => {
    const path = el.dataset.bind;
    const handler = () => {
      const v = (el.type === 'radio') ? el.value : el.value;
      // For radios, only act on checked ones
      if (el.type === 'radio' && !el.checked) return;
      setByPath(state.report, path, v);
      // If user manually edits lat/lon, clear the "from GPS" badge — it's
      // no longer truthful. But only on user input, not programmatic value sets.
      if ((path === 'site.latitude' || path === 'site.longitude') && el === document.activeElement) {
        state.report.site.gpsAccuracy = null;
        state.report.site.gpsCapturedAt = null;
      }
      scheduleSave();
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
  // data-prev handlers
  document.querySelectorAll('[data-prev]').forEach(el => {
    const field = el.dataset.prev;
    const id = el.dataset.id;
    const handler = () => {
      const item = state.report.previousIncidents.find(p => p.id === id);
      if (item) {
        item[field] = el.value;
        scheduleSave();
      }
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
}

function setByPath(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function scheduleSave() {
  setSaveStatus('saving');
  if (state.saveTimer) clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(saveDraftNow, 500);
}

async function saveDraftNow() {
  if (!state.report) return;
  state.report.updatedAt = Date.now();
  try {
    await dbPut('drafts', state.report);
    state.drafts = await dbGetAll('drafts');
    setSaveStatus('saved');
    setTimeout(() => setSaveStatus('idle'), 1500);
  } catch (e) {
    setSaveStatus('error');
    // QuotaExceededError or similar — let the user know so they don't keep
    // working under the false impression that their changes are saved.
    const isQuota = e && (
      e.name === 'QuotaExceededError' ||
      e.code === 22 ||
      /quota/i.test(e.message || '')
    );
    if (isQuota) {
      showModal({
        title: 'Storage is full',
        body: '<p>This device is out of room to store more draft data — likely because of photos in your saved drafts. ' +
          'Your most recent changes <strong>have not been saved</strong>.</p>' +
          '<p>To fix this, go back to the home screen and delete drafts you no longer need. ' +
          'You can export a draft first if you want to keep it for later.</p>',
        actions: [{ label: 'OK', kind: 'primary' }]
      });
    } else {
      showModal({
        title: 'Could not save draft',
        body: '<p>Saving the draft failed. Your most recent changes have not been saved.</p>' +
          `<pre style="background:var(--bg);padding:8px;border-radius:6px;font-size:12px">${esc(e.message || String(e))}</pre>`,
        actions: [{ label: 'OK', kind: 'primary' }]
      });
    }
  }
}

function setSaveStatus(s) {
  state.saveStatus = s;
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.classList.remove('saving', 'saved', 'save-error');
  if (s === 'saving') {
    el.textContent = 'Saving...';
    el.classList.add('saving');
  } else if (s === 'saved') {
    el.textContent = 'Saved';
    el.classList.add('saved');
  } else if (s === 'error') {
    el.textContent = 'Save failed';
    el.classList.add('save-error');
  } else {
    el.textContent = 'Auto-saved';
  }
}

/* ===========================================================================
   WIZARD NAVIGATION
   =========================================================================== */
function nextStep() {
  if (state.stepIndex < STEPS.length - 1) {
    state.stepIndex++;
    state.gpsStatus = null;
    saveDraftNow();
    render();
    window.scrollTo(0, 0);
  }
}
function prevStep() {
  if (state.stepIndex > 0) {
    state.stepIndex--;
    state.gpsStatus = null;
    render();
    window.scrollTo(0, 0);
  }
}
function exitWizard() {
  saveDraftNow().then(() => {
    state.view = 'home';
    state.report = null;
    state.gpsStatus = null;
    render();
  });
}

/* Convert a base64 string into a Uint8Array (binary) for PizZip */
function base64ToUint8Array(b64) {
  const binary = atob(b64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

function dataUrlToUint8Array(dataUrl) {
  const comma = dataUrl.indexOf(',');
  return base64ToUint8Array(dataUrl.slice(comma + 1));
}

/* Render a photo with its arrows baked in.
   Returns { bytes: Uint8Array (JPEG), width, height }. */
function bakeArrowsIntoPhoto(photo) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onerror = () => reject(new Error('Failed to load photo for baking'));
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      // Re-use the same drawArrow function the editor uses
      if (photo.arrows && photo.arrows.length > 0) {
        photo.arrows.forEach(a => drawArrow(ctx, a, canvas.width, canvas.height, false));
      }
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      resolve({
        bytes: dataUrlToUint8Array(dataUrl),
        width: canvas.width,
        height: canvas.height
      });
    };
    img.src = photo.imageData;
  });
}

/* Compute display dimensions in pixels.
   Word uses EMU (914400 per inch); for OOXML drawing extents we use EMU.
   We aim for ~5 inches max width on the page (i.e. ~6.5" content area
   with 1" margins, leaving some breathing room). */
const DRAW_MAX_WIDTH_EMU = 4572000;  // 5 inches in EMU (914400 per inch)
const PX_TO_EMU = 9525;              // 1 px @ 96 DPI = 9525 EMU
function computeImageExtentEmu(naturalW, naturalH) {
  let cx = naturalW * PX_TO_EMU;
  let cy = naturalH * PX_TO_EMU;
  if (cx > DRAW_MAX_WIDTH_EMU) {
    const scale = DRAW_MAX_WIDTH_EMU / cx;
    cx = DRAW_MAX_WIDTH_EMU;
    cy = Math.round(cy * scale);
  }
  return { cx: Math.round(cx), cy: Math.round(cy) };
}

/* Build the <w:p>/<w:r>/<w:drawing> XML for an inline image.
   docxtemplater's {@xxx} raw-XML insertion replaces the parent paragraph
   entirely, so we must provide the full <w:p><w:r>...</w:r></w:p> wrapper.
   We center the paragraph and give the image proper inline-anchored markup. */
function buildImageParagraphXml(relId, imageId, cx, cy, filename) {
  return '<w:p>' +
    '<w:pPr><w:spacing w:after="80" w:before="80"/><w:jc w:val="center"/></w:pPr>' +
    '<w:r>' +
      '<w:drawing>' +
        '<wp:inline distT="0" distB="0" distL="0" distR="0">' +
          '<wp:extent cx="' + cx + '" cy="' + cy + '"/>' +
          '<wp:effectExtent l="0" t="0" r="0" b="0"/>' +
          '<wp:docPr id="' + imageId + '" name="Picture ' + imageId + '" descr="' + filename + '"/>' +
          '<wp:cNvGraphicFramePr><a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/></wp:cNvGraphicFramePr>' +
          '<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">' +
            '<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">' +
              '<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">' +
                '<pic:nvPicPr>' +
                  '<pic:cNvPr id="' + imageId + '" name="' + filename + '"/>' +
                  '<pic:cNvPicPr><a:picLocks noChangeAspect="1" noChangeArrowheads="1"/></pic:cNvPicPr>' +
                '</pic:nvPicPr>' +
                '<pic:blipFill>' +
                  '<a:blip r:embed="' + relId + '"/>' +
                  '<a:stretch><a:fillRect/></a:stretch>' +
                '</pic:blipFill>' +
                '<pic:spPr bwMode="auto">' +
                  '<a:xfrm><a:off x="0" y="0"/><a:ext cx="' + cx + '" cy="' + cy + '"/></a:xfrm>' +
                  '<a:prstGeom prst="rect"><a:avLst/></a:prstGeom>' +
                '</pic:spPr>' +
              '</pic:pic>' +
            '</a:graphicData>' +
          '</a:graphic>' +
        '</wp:inline>' +
      '</w:drawing>' +
    '</w:r>' +
  '</w:p>';
}

/* Format a date for display (yyyy-mm-dd as captured) */
function formatReportDate(iso) {
  return iso || '';
}

/* Build the docxtemplater data + the photo-injection plan.
   Returns { data, photoFiles: Map<string filename, Uint8Array bytes>, relsXml: string of rels to append } */
async function buildReportData(report, profile) {
  // Bake arrows into all photos in parallel
  const baked = await Promise.all(
    report.photos.map(async (p) => ({ photo: p, baked: await bakeArrowsIntoPhoto(p) }))
  );

  // Allocate relationship IDs starting from rId100 (well above whatever
  // the template's existing rels number — the template has only header/footer
  // refs, so rId100+ is safe).
  let nextRid = 100;
  const photoFiles = new Map();           // "image1.jpg" -> bytes
  const relsToAppend = [];                // <Relationship .../> strings
  const photoDrawingByPhotoId = new Map(); // photo.id -> drawing XML string

  baked.forEach(({ photo, baked: b }, idx) => {
    const filename = 'photo' + (idx + 1) + '.jpg';
    const relId = 'rId' + (nextRid + idx);
    photoFiles.set(filename, b.bytes);
    relsToAppend.push(
      '<Relationship Id="' + relId + '" ' +
      'Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" ' +
      'Target="media/' + filename + '"/>'
    );
    const { cx, cy } = computeImageExtentEmu(b.width, b.height);
    const drawing = buildImageParagraphXml(relId, idx + 100, cx, cy, filename);
    photoDrawingByPhotoId.set(photo.id, drawing);
  });

  // Group photos by section. Each section gets its own photos_<sectionId> array
  // which the template's per-section photo loop iterates.
  const photosBySectionKey = {};
  PHOTO_SECTIONS.forEach(s => { photosBySectionKey['photos_' + s.id] = []; });

  baked.forEach(b => {
    const sectionId = b.photo.section || 'general';
    const key = 'photos_' + sectionId;
    if (!photosBySectionKey[key]) photosBySectionKey[key] = [];
    photosBySectionKey[key].push({
      photo_xml: photoDrawingByPhotoId.get(b.photo.id),
      photo_caption: b.photo.caption || ''
    });
  });

  // Format previous incidents
  const previousIncidents = (report.previousIncidents || []).map(pi => ({
    afrrcs_file: pi.afrrcsFile || '',
    offence_type: pi.offence || '',
    incident_date: pi.date || '',
    rcmp_file: pi.rcmpFile || '',
    description: pi.description || ''
  }));

  return {
    data: {
      // Top-of-page identifiers
      police_file: report.basics.policeFile || '',
      afrrcs_file: report.basics.afrrcsFile || '',
      // Field block
      report_date: formatReportDate(report.basics.reportDate),
      wo_number: report.basics.woNumber || '',
      // Reporter — comes from saved profile
      reporter_name: profile.name || '',
      reporter_title: profile.title || '',
      reporter_email: profile.email || '',
      reporter_phone: profile.phone || '',
      // Site
      site_name: report.site.name || '',
      site_number: report.site.number || '',
      site_address: report.site.address || '',
      site_latitude: report.site.latitude || '',
      site_longitude: report.site.longitude || '',
      site_function: report.site.function || 'Communication site',
      surveillance: report.site.surveillance || 'No',
      date_reported: formatReportDate(report.basics.dateReported),
      offence: report.basics.offence || '',
      // Narrative
      initial_notification: report.narrative.initialNotification || '',
      site_attendance: report.narrative.siteAttendance || '',
      observations: report.narrative.observations || '',
      findings: report.narrative.findings || '',
      conclusions: report.narrative.conclusions || '',
      next_steps: report.narrative.nextSteps || '',
      // Per-section photos
      ...photosBySectionKey,
      // Previous incidents
      has_previous_incidents: previousIncidents.length > 0,
      previous_incidents: previousIncidents
    },
    photoFiles,
    relsToAppend
  };
}

/* Generate the .docx and trigger download */
async function generateReport() {
  const r = state.report;
  if (!r) return;

  const issues = [];
  if (!r.site.name) issues.push('Site name (Step 1)');
  if (!r.basics.afrrcsFile) issues.push('AFRRCS file # (Step 2)');
  if (issues.length > 0) {
    showModal({
      title: 'Some required fields are missing',
      body: '<p>Please fill in:</p><ul style="margin:0;padding-left:20px">' +
        issues.map(s => '<li>' + esc(s) + '</li>').join('') + '</ul>' +
        '<p style="margin-top:12px">You can still continue if you want to generate an incomplete draft.</p>',
      actions: [
        { label: 'Cancel', kind: 'secondary' },
        { label: 'Generate anyway', kind: 'primary', onClick: async () => { await doGenerate(); } }
      ]
    });
    return;
  }

  await doGenerate();
}

async function doGenerate() {
  const r = state.report;
  const profile = state.profile;

  const btn = document.querySelector('.wizard-footer button.btn-primary');
  const origText = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="gps-spinner"></span> Generating…';
  }

  try {
    // Build data + bake arrows
    const { data, photoFiles, relsToAppend } = await buildReportData(r, profile);

    // Load template, render with docxtemplater (no image module needed)
    const templateBytes = base64ToUint8Array(TEMPLATE_BASE64);
    const zip = new PizZip(templateBytes);

    const doc = new docxtemplater(zip, {
      paragraphLoop: true,
      linebreaks: true,
      nullGetter: () => ''
    });

    doc.render(data);

    // Now manually inject photo files and rels into the rendered zip.
    const renderedZip = doc.getZip();

    // 1. Add each photo to word/media/
    photoFiles.forEach((bytes, filename) => {
      renderedZip.file('word/media/' + filename, bytes);
    });

    // 2. Add JPEG to [Content_Types].xml if not already there
    if (renderedZip.file('[Content_Types].xml')) {
      let ct = renderedZip.file('[Content_Types].xml').asText();
      if (!ct.includes('Extension="jpg"') && !ct.includes('Extension="jpeg"')) {
        // Insert JPEG content-type before closing </Types>
        ct = ct.replace('</Types>',
          '<Default Extension="jpg" ContentType="image/jpeg"/>' +
          '<Default Extension="jpeg" ContentType="image/jpeg"/>' +
          '</Types>');
        renderedZip.file('[Content_Types].xml', ct);
      }
    }

    // 3. Append photo relationships to word/_rels/document.xml.rels
    if (relsToAppend.length > 0) {
      const relsFile = renderedZip.file('word/_rels/document.xml.rels');
      if (relsFile) {
        let relsXml = relsFile.asText();
        relsXml = relsXml.replace('</Relationships>',
          relsToAppend.join('') + '</Relationships>');
        renderedZip.file('word/_rels/document.xml.rels', relsXml);
      }
    }

    // Generate final blob
    const out = renderedZip.generate({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });

    const filename = buildFilename(r);
    const url = URL.createObjectURL(out);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 1000);

    toast('Report generated. Check your downloads.', 4000);

  } catch (err) {
    console.error('Generation failed:', err);
    let msg = err.message || String(err);
    if (err.properties && err.properties.errors) {
      msg += '\n\nDetails:\n' + err.properties.errors.map(e =>
        e.properties && e.properties.explanation ? '• ' + e.properties.explanation : '• ' + e.message
      ).join('\n');
    }
    showModal({
      title: 'Could not generate the document',
      body: '<p>Something went wrong while building the .docx file. Your draft is safe — nothing has been lost.</p>' +
        '<pre style="background:var(--bg);padding:8px;border-radius:6px;font-size:12px;white-space:pre-wrap;max-height:200px;overflow:auto">' +
        esc(msg) + '</pre>',
      actions: [{ label: 'Close', kind: 'secondary' }]
    });
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = origText;
    }
  }
}

function buildFilename(r) {
  const fileId = (r.basics.afrrcsFile || '').replace(/^\d{4}-/, '').padStart(3, '0') || 'XXX';
  const siteName = (r.site.name || 'Unknown').replace(/[^A-Za-z0-9]/g, '');
  const offence = (r.basics.offence || '').replace(/[^A-Za-z0-9]/g, '').slice(0, 20) || 'Incident';
  const dateStr = (r.basics.reportDate || todayISO()).replace(/-/g, '');
  return fileId + '_' + siteName + '_IncidentReport_' + offence + '_' + dateStr + '.docx';
}

/* ===========================================================================
   SITE PICKER
   =========================================================================== */
function initSitePicker() {
  const search = document.getElementById('site-search');
  if (!search) return;
  const results = document.getElementById('site-results');
  let activeIndex = -1;

  function showResults(matches) {
    if (matches.length === 0) {
      results.classList.add('hide');
      return;
    }
    results.innerHTML = matches.slice(0, 50).map((s, i) => `
      <div class="site-result" data-site-id="${s.id}">
        <div class="name">${esc(s.name)} #${s.id}</div>
        <div class="meta">${esc(s.land || '')} · ${s.lat?.toFixed?.(5) ?? ''}, ${s.lon?.toFixed?.(5) ?? ''}</div>
      </div>
    `).join('');
    results.classList.remove('hide');
    results.querySelectorAll('.site-result').forEach(el => {
      el.addEventListener('mousedown', (ev) => {
        ev.preventDefault();
        const id = parseInt(el.dataset.siteId, 10);
        const site = SITES.find(s => s.id === id);
        if (site) selectSite(site);
      });
    });
  }

  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    if (!q) { results.classList.add('hide'); return; }
    const matches = SITES.filter(s => {
      return s.name.toLowerCase().includes(q) || String(s.id).includes(q);
    });
    showResults(matches);
  });
  search.addEventListener('blur', () => {
    setTimeout(() => results.classList.add('hide'), 150);
  });
  search.addEventListener('focus', () => {
    if (search.value) search.dispatchEvent(new Event('input'));
  });
}

function useGPS() {
  if (!('geolocation' in navigator)) {
    setGpsStatus('error', 'GPS not available',
      "This device or browser doesn't support location services. You can enter coordinates manually.");
    renderWizard();
    return;
  }

  state.gpsBusy = true;
  setGpsStatus('info', 'Locating with GPS…',
    "Allow location access when prompted. This may take up to 15 seconds.");
  renderWizard();

  // Strategy: try high-accuracy first (real GPS) with a 15s timeout.
  // If it times out or fails with POSITION_UNAVAILABLE, fall back to
  // low-accuracy positioning (Wi-Fi / network / cell tower) which is
  // less precise but works in many situations where pure GPS doesn't —
  // notably on laptops without a GPS chip, or near a tower with poor
  // sky visibility.
  tryGpsHighAccuracy();
}

function tryGpsHighAccuracy() {
  const options = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.gpsBusy = false;
      handleGpsSuccess(pos);
    },
    (err) => {
      // On TIMEOUT or POSITION_UNAVAILABLE, fall back to low-accuracy
      // (network-based) positioning. PERMISSION_DENIED is handled directly
      // since retrying won't help.
      if (err.code === 1) { // PERMISSION_DENIED
        state.gpsBusy = false;
        handleGpsError(err);
        return;
      }
      // Show a fallback-in-progress message so the user knows something
      // is still happening
      setGpsStatus('info', 'Trying network location…',
        "GPS didn't respond in time. Trying Wi-Fi / network positioning instead. This is less accurate but should be quicker.");
      renderWizard();
      tryGpsLowAccuracy(err);
    },
    options
  );
}

function tryGpsLowAccuracy(highAccuracyErr) {
  const options = { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 };
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.gpsBusy = false;
      handleGpsSuccess(pos);
    },
    (err) => {
      // Both attempts failed. Use the more informative of the two errors.
      // If the first error was PERMISSION_DENIED we'd have stopped earlier,
      // so we know the failure here is TIMEOUT or UNAVAILABLE for both.
      state.gpsBusy = false;
      handleGpsError(err);
    },
    options
  );
}

function handleGpsSuccess(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy; // metres

  // Format to match the precision in existing reports (~7 decimals).
  // e.g. -113.1708889
  const latStr = lat.toFixed(7).replace(/\.?0+$/, '');
  const lonStr = lon.toFixed(7).replace(/\.?0+$/, '');

  // Update the report
  state.report.site.latitude = latStr;
  state.report.site.longitude = lonStr;
  state.report.site.gpsAccuracy = acc;
  state.report.site.gpsCapturedAt = Date.now();

  // Distance check: if a known site is selected, see if we're suspiciously far
  // from its registered coordinates. 5 km is a reasonable threshold — the
  // real coordinate variance between registered and on-site GPS in your data
  // is much smaller (~150 m for Wiau Lake), so 5 km will only trip on real
  // mistakes (wrong site picked, or wildly bad GPS reading).
  const site = state.report.site;
  let warning = null;
  if (site.id != null) {
    const known = SITES.find(s => s.id === site.id);
    if (known && known.lat != null && known.lon != null) {
      const dist = haversineMeters(lat, lon, known.lat, known.lon);
      if (dist > 5000) {
        warning = { dist: dist, siteName: known.name };
      }
    }
  }

  if (warning) {
    setGpsStatus('warning', `You're ${formatDistance(warning.dist)} from ${warning.siteName}`,
      `That's farther than expected. Double-check the site you picked, or tap "Change" above if you meant a different site. ` +
      `Coordinates have been filled in regardless — edit them manually if needed.`);
  } else if (acc > 500) {
    // Almost certainly a network/Wi-Fi reading, not real GPS
    setGpsStatus('warning', 'Network location captured',
      `Accuracy ±${Math.round(acc)} m — this is from Wi-Fi or cell tower positioning, not GPS. ` +
      `For better accuracy at the actual site, try again outdoors with a clear view of the sky.`);
  } else if (acc > 100) {
    setGpsStatus('warning', 'Location captured (low accuracy)',
      `Accuracy ±${Math.round(acc)} m — this is fairly imprecise. ` +
      `If you have a clear view of the sky, wait a moment and tap "Update location" again for a better reading.`);
  } else {
    setGpsStatus('success', 'Location captured',
      `Accuracy ±${Math.round(acc)} m. Coordinates filled in below.`);
  }

  saveDraftNow();
  renderWizard();
}

function handleGpsError(err) {
  let title, body;

  // Detect if the user opened the file directly via file:// — in some browsers
  // (especially mobile Safari), this silently breaks geolocation. The fix is
  // to host the app on HTTPS.
  const isFileUrl = location.protocol === 'file:';
  const fileNote = isFileUrl
    ? '\n\nNote: this app was opened from a local file. Some browsers (notably mobile Safari) restrict GPS when the app is loaded this way. If this keeps happening, the app should be hosted on a secure (https) URL.'
    : '';

  switch (err.code) {
    case 1: // PERMISSION_DENIED
      title = 'Location permission denied';
      body = "To use GPS, allow location access in your browser settings, then tap the button again. " +
             "On iPhone: Settings > Safari > Location. On Android: Site settings > Location. " +
             "You can also enter coordinates manually.";
      break;
    case 2: // POSITION_UNAVAILABLE
      title = 'Location unavailable';
      body = "Your device couldn't determine its position. This can happen indoors, in deep cover, or on a device without GPS or internet. " +
             "Try moving to a spot with a clearer view of the sky and tap again, or enter coordinates manually." + fileNote;
      break;
    case 3: // TIMEOUT
      title = 'Location request timed out';
      body = "GPS and network positioning both took too long to respond. " +
             "This is common in remote areas or on laptops without a GPS chip. " +
             "Try again in a moment, or enter coordinates manually." + fileNote;
      break;
    default:
      title = 'Could not get location';
      body = (err.message || "An unknown error occurred.") + " You can enter coordinates manually." + fileNote;
  }
  setGpsStatus('error', title, body);
  renderWizard();
}

function setGpsStatus(kind, title, body) {
  state.gpsStatus = { kind, title, body };
}

function gpsStatusIcon(kind) {
  switch (kind) {
    case 'info':    return '<span class="gps-spinner"></span>';
    case 'success': return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>';
    case 'warning': return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.3 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>';
    case 'error':   return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6m0-6l6 6"/></svg>';
    default: return '';
  }
}

// Haversine: great-circle distance between two lat/long points, in metres.
function haversineMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function formatDistance(m) {
  if (m < 1000) return Math.round(m) + ' m';
  return (m / 1000).toFixed(1) + ' km';
}

function summarizePhotosBySection(photos) {
  const counts = {};
  photos.forEach(p => {
    const id = p.section || 'general';
    counts[id] = (counts[id] || 0) + 1;
  });
  return PHOTO_SECTIONS
    .filter(s => counts[s.id])
    .map(s => `${s.label}: ${counts[s.id]}`)
    .join(' · ');
}

function formatGpsTime(ts) {
  if (!ts) return '';
  const elapsed = Date.now() - ts;
  if (elapsed < 60000) return 'just now';
  if (elapsed < 3600000) return Math.round(elapsed / 60000) + ' min ago';
  const d = new Date(ts);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) {
    return 'today at ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) +
         ' at ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

/* ===========================================================================
   MODAL & TOAST
   =========================================================================== */
function showModal({ title, body, actions }) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header"><h2>${esc(title)}</h2></div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">
        ${actions.map((a, i) => `
          <button class="btn btn-${a.kind || 'secondary'}" data-modal-action="${i}">${esc(a.label)}</button>
        `).join('')}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-modal-action]').forEach((btn, i) => {
    btn.addEventListener('click', async () => {
      const a = actions[i];
      // Default behavior: close the modal after the click. If the handler
      // explicitly returns false, the modal stays open (e.g. validation
      // failed and we want the user to fix something before continuing).
      let result;
      if (a.onClick) {
        result = await a.onClick();
      }
      if (result !== false) {
        overlay.remove();
      }
    });
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });
}

function toast(msg, ms = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

/* ===========================================================================
   UTILITIES
   =========================================================================== */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}

function formatDateTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  const isYest = d.toDateString() === yest.toDateString();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (sameDay) return 'today at ' + time;
  if (isYest) return 'yesterday at ' + time;
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }) + ' at ' + time;
}

/* ===========================================================================
   BOOT
   =========================================================================== */
init().catch(err => {
  console.error('Init failed:', err);
  root.innerHTML = `<div class="main"><div class="card" style="background:var(--danger-bg);border-color:var(--danger);color:var(--danger)"><strong>App failed to start:</strong> ${esc(err.message)}</div></div>`;
});
</script>
